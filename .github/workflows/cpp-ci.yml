name: C++ CI

on:
  push:
    branches:
      - main
      - fix/recruiter-ready-scheduler
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show compiler version
        run: g++ --version

      - name: Compile directly with g++
        run: g++ -std=c++11 src/main.cpp src/Parser.cpp src/Scheduler.cpp src/Reporter.cpp -Iinclude -o scheduler

      - name: Run CLI regression tests
        run: bash tests/run_cli_tests.sh

      - name: Configure with CMake
        run: cmake -S . -B build

      - name: Build with CMake
        run: cmake --build build

      - name: Run CTest
        run: ctest --test-dir build --output-on-failure
